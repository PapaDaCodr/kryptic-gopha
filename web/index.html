<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kryptic Gopha Dashboard</title>
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">⛏️</div>
                <h1>Kryptic Gopha</h1>
            </div>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Balance</div>
                    <div class="metric-value" id="val-balance">$0.00</div>
                    <div class="metric-subtitle" id="val-daily-pnl">Daily PnL: $0.00</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">Win Rate</div>
                    <div class="metric-value" id="val-winrate">0.0%</div>
                    <div class="metric-subtitle">Target: 85-99%</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">Active Trades</div>
                    <div class="metric-value" id="val-active">0</div>
                    <div class="metric-subtitle">Max Allowed: 5</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">Circuit Breaker</div>
                    <div class="metric-value" id="val-status">ACTIVE</div>
                    <div class="metric-subtitle">Status</div>
                </div>
            </div>
            
            <div class="recent-trades">
                <h3>Recent Trades</h3>
                <div id="trades-list" class="trades-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </aside>

        <!-- Main Content (Chart) -->
        <main class="main-content">
            <header class="chart-header">
                <div class="symbol-selector" id="symbol-badges">
                    <!-- Populated by JS -->
                </div>
                <div class="chart-legend" id="chart-legend">
                    Loading data...
                </div>
            </header>
            
            <div class="chart-container" id="chart">
                <!-- Lightweight chart injected here -->
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
